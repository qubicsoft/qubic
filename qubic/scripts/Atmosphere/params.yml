### Atmosphere parameters

path_am_files: "absorption_coefficient/"

# Physical parameters
correlation_length: 1000             # Atmospheric correlation maximum lenght in m
altitude_atm_2d: 1000                # Altitude of the atmosphere above QUBIC for 2D model in m
rho_0: 40                            # Reference water vapor density in g/m³
h_h2o: 835                           # Water vapor half-height in m
h_temp: 35000                        # Typical height that depends on the observation site, in m
temp_ground: 280                     # Average ground temperature on the observation site, in K

#! Not sure to use that now
#! temp_atm: 280                     # Average atm temperature on the observation site, in K

pressure_atm: 550                    # Atmopsheric pressure in hPa
#! rho_0 should be computed using pwv in a more advanced version
pwv: 1                               # Precipitable Water Vapor, ie the integrale of water vapor density along an atm column, mm
sigma_pwv: 0.52                      # Variance of PWV in mm^-²
sigma_rho: 0.25                      # Variance of water vapor density in g²/m⁶
adjust: True

# Simulation parameters
n_grid: 1000                         # Number of squares in the grid
h_grid: 1                            # Number of sqares for the altitude, i for 2d model
h_qubic: 4869                        # QUBIC altitude in m
size_atm: 10000                      # Lenght of the atm in m
2d: True                             # Determine if you want to simulate a 2d atm
nside: 128
n_theta: 10000
normalization: 1
flat: False
coverage_cut: 0.1
dtheta: 15
seed: 1

### Map-making parameters

# Qubic parameters
nsub_in: 8                           # Number of sub-acquisitions used to integrate over the atm spectrum
nrec: 1
npointings: 3000
kmax: 1
synthbeam_fraction: 1
wdet: 0
wpho150: 0
wpho220: 0

# Sky parameters
cmb: true
atm: false

# Reconstruction parameters
preconditioner: false
n_iter: 300
n_loop: 1
iterative_iter: false
convolutions: false
sweeping_pointings: true             # If false: random pointings
fit_mixing_matrix: false
fix_maps: true

# Wind
wind: false
wind_type: "constant"                # Can be : "constant" or "normal"
wind_cst: [-10, 0]                   # [wind_x, wind_y]
wind_normal: [0, 1]                  # [wind_mean, wind_std]
